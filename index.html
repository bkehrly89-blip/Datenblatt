<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pusch Heizung – Fragebogen Beratungsgespräch</title>

<!-- ✅ FIX: CDN statt kaputter lokaler Datei -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

<style>
:root {
  --brand: #c51f17;
  --brand-dark: #94150f;
  --brand-soft: #fff1ef;
  --ink: #223246;
  --muted: #647688;
  --line: #dfe6ed;
}

body {
  background: radial-gradient(circle at top right, rgba(197,31,23,.10), transparent 28%),
              linear-gradient(180deg, #fff 0%, #faf7f6 100%);
  color: var(--ink);
}

/* NAV */
nav {
  border-bottom: 1px solid rgba(0,0,0,.06);
  background: rgba(255,255,255,.95);
}

.brandlock {
  display: flex;
  align-items: center;
  gap: .8rem;
  font-weight: 700;
  text-decoration: none;
  color: var(--ink);
}

.brandlock img {
  height: 50px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 2rem 1rem;
}

.eyebrow {
  background: var(--brand-soft);
  padding: .4rem .8rem;
  border-radius: 999px;
  font-size: .85rem;
  display: inline-block;
  margin-bottom: 1rem;
}

/* CARDS */
.content-card {
  background: #fff;
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: 0 10px 30px rgba(0,0,0,.05);
}

/* STEPS */
.step-panel {
  display: none;
}

.step-panel.active {
  display: block;
}

/* BUTTONS */
.btn-brand {
  background: var(--brand);
  border: none;
  border-radius: 999px;
}

.btn-brand:hover {
  background: var(--brand-dark);
}

/* PROGRESS */
.progress-bar {
  height: 10px;
  background: #eee;
  border-radius: 999px;
}

.progress-fill {
  height: 100%;
  background: var(--brand);
}

/* MOBILE */
@media (max-width: 768px) {
  .grid-2 {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<nav class="container-fluid">
  <ul>
    <li>
      <a class="brandlock">
        <img src="logo.jpg">
        <span>
          Fragebogen Beratungsgespräch<br>
          <small>Pusch Wasser · Wärme · Solar</small>
        </span>
      </a>
    </li>
  </ul>
  <ul>
    <li><a href="#">Start</a></li>
    <li><a href="#fragebogen">Fragebogen</a></li>
    <li><a href="#fragebogen" role="button">Jetzt starten</a></li>
  </ul>
</nav>

<main class="container">

<section class="hero">
  <span class="eyebrow">Digitale Vorbereitung</span>
  <h2>Fragebogen für Ihr Beratungsgespräch</h2>
  <p>Bitte vollständig ausfüllen – so können wir optimal vorbereiten.</p>

  <a href="#fragebogen" role="button" class="btn-brand">Start</a>
</section>

<section id="fragebogen" class="content-card">

<div class="progress-bar">
  <div class="progress-fill" id="progress" style="width:10%"></div>
</div>

<form action="https://formsubmit.co/b.kehrly@pusch-heizung.de" method="POST">

<input type="hidden" name="_subject" value="Fragebogen Beratung">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<!-- STEP 1 -->
<div class="step-panel active">
<h3>Kontaktdaten</h3>

<input type="text" name="Name" placeholder="Name" required>
<input type="email" name="Email" placeholder="E-Mail" required>
<input type="text" name="Telefon" placeholder="Telefon">

<button type="button" onclick="next()">Weiter</button>
</div>

<!-- STEP 2 -->
<div class="step-panel">
<h3>Gebäude</h3>

<input type="number" name="Baujahr" value="1990">
<input type="number" name="Wohnfläche" placeholder="m²">

<button type="button" onclick="prev()">Zurück</button>
<button type="button" onclick="next()">Weiter</button>
</div>

<!-- STEP 3 -->
<div class="step-panel">
<h3>Heizung</h3>

<select name="Heizung">
<option>Gas</option>
<option>Öl</option>
<option>Wärmepumpe</option>
</select>

<select name="Standort">
<option>Keller</option>
<option>Erdgeschoss</option>
<option>Spitzboden</option>
</select>

<button type="button" onclick="prev()">Zurück</button>
<button type="submit">Absenden</button>
</div>

</form>

</section>

</main>

<script>
let step = 0;
const steps = document.querySelectorAll(".step-panel");
const progress = document.getElementById("progress");

function show(){
  steps.forEach((s,i)=>s.classList.toggle("active", i===step));
  progress.style.width = ((step+1)/steps.length*100)+"%";
}

function next(){
  if(step < steps.length-1){
    step++;
    show();
  }
}

function prev(){
  if(step > 0){
    step--;
    show();
  }
}

show();
</script>

</body>
</html>
